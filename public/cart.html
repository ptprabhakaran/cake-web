<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | The Cake Theory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@500;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <header class="topbar">
    <button class="icon-button menu-toggle" type="button" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="desktop-nav" aria-label="Primary navigation">
      <a href="index.html#home">Home</a>
      <a href="index.html#cakes">Cakes</a>
      <a href="index.html#desserts">Baked Treats</a>
      <a href="index.html#custom">Customized Cakes</a>
    </nav>

    <a class="logo" href="index.html#home" aria-label="The Cake Theory home">
      <span>
        <strong>The Cake Theory</strong>
        <small>→ Home made with ♥</small>
      </span>
    </a>

    <nav class="desktop-nav right-nav" aria-label="Secondary navigation">
      <a href="index.html#reviews">Reviews</a>
      <a href="index.html#contact">Contact Us</a>
      <a class="cart-link cart-button" href="cart.html" style="display:flex; align-items:center; gap:6px;"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg> Cart <span id="cartCount">0</span></a>
    </nav>
  </header>

  <main class="cart-page">
    <section class="cart-shell">
      <div class="cart-heading">
        <p class="eyebrow">Your order</p>
        <h1>Cart</h1>
      </div>

      <div class="cart-layout">
        <div class="cart-items" id="cartItems"></div>

        <aside class="cart-summary">
          <h2>Order Summary</h2>
          <div class="summary-row">
            <span>Items</span>
            <strong id="summaryItems">0</strong>
          </div>
          <div class="summary-row">
            <span>Total</span>
            <strong id="summaryTotal">Rs. 0.00</strong>
          </div>
          <form class="checkout-form" id="checkoutForm">
            <input type="text" name="customer_name" placeholder="Your name" required>
            <input type="tel" name="phone" placeholder="Phone number" required>
            <textarea name="address" rows="3" placeholder="Delivery address" required></textarea>
            <textarea name="notes" rows="2" placeholder="Order notes"></textarea>
            <button class="checkout-button" type="submit">Place Order</button>
            <p class="checkout-status" id="checkoutStatus" role="status" aria-live="polite"></p>
          </form>
          <a class="continue-shopping" href="index.html#cakes">Continue Shopping</a>
          <button class="clear-cart-button" type="button" id="clearCart">Clear Cart</button>
        </aside>
      </div>
    </section>
  </main>

  <footer class="footer" id="contact">
    <p class="copyright">© The Cake Theory</p>
    <div class="social-links" aria-label="Social links">
      <span>Contact Us</span>
      <a href="https://www.instagram.com/thecaketheory_23?igsh=MXh0NGl6bTZhbHhzeA==" aria-label="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.5" cy="6.5" r="1"></circle>
        </svg>
      </a>
    </div>
  </footer>

  <div class="toast" role="status" aria-live="polite"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="/static/js/script.js"></script>
</body>
</html>
